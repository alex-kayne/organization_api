services:
  db:
    image: postgres:16-alpine
    container_name: organization_api_db
    environment:
      POSTGRES_DB: organization_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d organization_api"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: organization_api_app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/organization_api
      ALEMBIC_DATABASE_URL: postgresql://postgres:postgres@db:5432/organization_api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app

volumes:
  postgres_data: